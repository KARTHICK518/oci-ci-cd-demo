name: Sync to OCI Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Push to OCI
        run: |
          git remote add oci https://${{ secrets.OCI_USERNAME }}:${{ secrets.OCI_TOKEN }}@devops.scmservice.ap-mumbai-1.oci.oraclecloud.com/namespaces/bmvrgmpn2hpv/projects/ci-cd-project/repositories/my-repo
          git push oci main --force
